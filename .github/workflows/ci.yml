name: PR Checks

on:
  pull_request:

permissions:
  statuses: write
  checks: write
  contents: read
  pull-requests: read
  security-events: write

jobs:
  pr-checks:
    uses: actionsforge/actions/.github/workflows/python-image-pr-checks.yml@main
    with:
      python-version: "3.13"
      trivy-vuln-type: library
