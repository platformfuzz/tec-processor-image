# requirements.lock — exact resolved versions for reproducible container builds.
# This file records pinned (==) versions of all direct and transitive dependencies
# installed in the tec-processor-image container. It is consumed by the Dockerfile
# via `pip install -r requirements.lock` to ensure identical installs across builds.
#
# Direct dependencies: pytecgg, pyarrow, polars
# Transitive (via pytecgg): numpy, scipy, numba, llvmlite, pymap3d, tzdata,
#   ppigrf, requests, pandas, certifi, charset-normalizer, idna
#
# NOTE: boto3 is NOT included here — it is provided by the AWS Lambda runtime.
# Regenerate this file when upgrading dependencies by resolving the full dependency
# tree from pyproject.toml constraints on Python 3.13 (Lambda base image).

